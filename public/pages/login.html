<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transport Billing — Sign In</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body class="login-body">
    <div class="login-layout">

      <!-- Left: 3D car -->
      <div class="login-car">
        <div class="login-car-brand">
          <span class="brand-badge" aria-hidden="true"></span>
          <span class="login-car-title">Transport Billing</span>
        </div>
        <div class="mv-wrap" id="mvWrap">
          <div id="mvStatus" class="mv-status" role="status" aria-live="polite">Loading 3D viewer…</div>
          <model-viewer
            id="carModel"
            src="/models/car-concept.glb"
            alt="3D concept car"
            camera-controls
            touch-action="none"
            shadow-intensity="1"
            exposure="1"
            interaction-prompt="none"
            loading="eager"
            field-of-view="28deg"
            class="mv-car"
          ></model-viewer>
        </div>
        <p class="login-car-sub">Manage trips, billing &amp; payments in one place.</p>
      </div>

      <!-- Right: Auth form -->
      <div class="login-panel">
        <div class="login-card">

          <!-- Tabs -->
          <div class="login-tabs">
            <button class="login-tab active" id="tabLogin" type="button">Sign in</button>
            <button class="login-tab" id="tabSignup" type="button">Create account</button>
          </div>

          <!-- Error banner -->
          <div class="login-error" id="loginError" style="display:none"></div>

          <!-- LOGIN FORM -->
          <form class="login-form" id="formLogin">
            <div class="field">
              <label class="field-label">Email</label>
              <input class="input" type="email" name="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="field">
              <label class="field-label">Password</label>
              <input class="input" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required />
            </div>
            <button class="btn primary login-submit" type="submit">Sign in</button>
          </form>

          <!-- SIGNUP FORM -->
          <form class="login-form" id="formSignup" style="display:none">
            <div class="field">
              <label class="field-label">Full name</label>
              <input class="input" type="text" name="name" autocomplete="name" placeholder="Your name" required />
            </div>
            <div class="field">
              <label class="field-label">Email</label>
              <input class="input" type="email" name="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="field">
              <label class="field-label">Password</label>
              <input class="input" type="password" name="password" autocomplete="new-password" placeholder="Min. 6 characters" required />
            </div>
            <button class="btn primary login-submit" type="submit">Create account</button>
          </form>

          <!-- Divider -->
          <div class="login-divider"><span>or</span></div>

          <!-- Google -->
          <a class="btn login-google" href="/auth/google" id="googleBtn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </a>
        </div>
      </div>

    </div>

    <script src="/vendor/model-viewer.umd.min.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
