<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transport Billing — Settings</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="fx-bg" aria-hidden="true">
      <div class="fx-blob b1"></div>
      <div class="fx-blob b2"></div>
      <div class="fx-blob b3"></div>
      <div class="fx-noise"></div>
      <div class="fx-vignette"></div>
    </div>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/pages/index.html" aria-label="Dashboard">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>Transport Billing<small>Settings</small></span>
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="/pages/index.html">Dashboard</a>
          <a href="/pages/trips.html">Trips</a>
          <a href="/pages/payments.html">Payments</a>
          <a href="/pages/clients.html">Clients</a>
          <a href="/pages/invoice.html">Invoice</a>
          <a class="active" href="/pages/settings.html">Settings</a>
          <button class="btn small" id="logoutBtn" type="button">Sign out</button>
        </nav>
      </div>
    </header>
    <main class="container">
      <div style="max-width:520px;margin-top:14px">
        <section class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Bank details</div>
              <div class="card-subtitle">Used in WhatsApp payment messages</div>
            </div>
          </div>
          <div class="card-body">
            <form id="settingsForm">
              <div class="grid" style="gap:10px">
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Business / trading name</div>
                  <input id="businessName" type="text" class="input" placeholder="e.g. ABC Transport" />
                </label>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Business address <span style="font-weight:500">(optional)</span></div>
                  <textarea id="businessAddress" class="input" rows="2" placeholder="e.g. 12 High Street, Coventry CV1 1AA"></textarea>
                </label>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Bank name</div>
                  <input id="bankName" type="text" class="input" placeholder="e.g. Monzo" />
                </label>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Account number</div>
                  <input id="accountNumber" type="text" class="input" placeholder="12345678" />
                </label>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Sort code</div>
                  <input id="sortCode" type="text" class="input" placeholder="00-00-00" />
                </label>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">WhatsApp business number</div>
                  <input id="whatsappBusinessNumber" type="tel" class="input" placeholder="447911123456" />
                </label>
                <div class="row">
                  <button type="submit" class="btn primary">Save settings</button>
                </div>
              </div>
            </form>
          </div>
        </section>

      </div>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/js/ui.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/settings.js"></script>
  </body>
</html>
