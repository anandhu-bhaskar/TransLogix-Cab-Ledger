<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transport Billing — Invoice</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="fx-bg" aria-hidden="true">
      <div class="fx-blob b1"></div>
      <div class="fx-blob b2"></div>
      <div class="fx-blob b3"></div>
      <div class="fx-noise"></div>
      <div class="fx-vignette"></div>
    </div>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/pages/index.html" aria-label="Dashboard">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>Transport Billing<small>Invoice</small></span>
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="/pages/index.html">Dashboard</a>
          <a href="/pages/trips.html">Trips</a>
          <a href="/pages/payments.html">Payments</a>
          <a href="/pages/clients.html">Clients</a>
          <a href="/pages/workers.html">Workers</a>
          <a class="active" href="/pages/invoice.html">Invoice</a>
          <a href="/pages/settings.html">Settings</a>
          <button class="btn small" id="logoutBtn" type="button">Sign out</button>
        </nav>
      </div>
    </header>
    <main class="container">
      <div style="max-width:540px;margin-top:14px">
        <section class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Generate invoice</div>
              <div class="card-subtitle">Download a Word document summary</div>
            </div>
          </div>
          <div class="card-body">
            <form id="invoiceForm">
              <div class="grid" style="gap:10px">
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Client</div>
                  <select id="clientId" class="input" required>
                    <option value="">Select client…</option>
                  </select>
                </label>
                <div class="grid cols-2">
                  <label>
                    <div class="muted" style="font-weight:800;margin-bottom:6px">From date</div>
                    <input id="fromDate" type="date" class="input" required />
                  </label>
                  <label>
                    <div class="muted" style="font-weight:800;margin-bottom:6px">To date</div>
                    <input id="toDate" type="date" class="input" required />
                  </label>
                </div>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Previous balance (£)</div>
                  <input id="prevBalance" type="number" step="0.01" class="input" placeholder="0.00" />
                </label>
                <div class="row">
                  <button type="submit" class="btn primary">Download invoice</button>
                </div>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/js/ui.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/invoice.js"></script>
  </body>
</html>
