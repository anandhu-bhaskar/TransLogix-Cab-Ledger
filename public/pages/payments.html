<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transport Billing — Payments</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="fx-bg" aria-hidden="true">
      <div class="fx-blob b1"></div>
      <div class="fx-blob b2"></div>
      <div class="fx-blob b3"></div>
      <div class="fx-noise"></div>
      <div class="fx-vignette"></div>
    </div>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/pages/index.html" aria-label="Dashboard">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>Transport Billing<small>Payments</small></span>
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="/pages/index.html">Dashboard</a>
          <a href="/pages/trips.html">Trips</a>
          <a class="active" href="/pages/payments.html">Payments</a>
          <a href="/pages/clients.html">Clients</a>
          <a href="/pages/workers.html">Workers</a>
          <a href="/pages/invoice.html">Invoice</a>
          <a href="/pages/settings.html">Settings</a>
          <button class="btn small" id="logoutBtn" type="button">Sign out</button>
        </nav>
      </div>
    </header>
    <main class="container">
      <div class="grid cols-2" style="margin-top:14px">

        <!-- Record payment -->
        <section class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Record payment</div>
              <div class="card-subtitle">Log money received from a client</div>
            </div>
          </div>
          <div class="card-body">
            <form id="paymentForm">
              <div class="grid" style="gap:10px">
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Client</div>
                  <select id="clientId" class="input" required>
                    <option value="">Select client…</option>
                  </select>
                </label>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Amount (£)</div>
                  <input id="amount" type="number" step="0.01" min="0" class="input" required />
                </label>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Date</div>
                  <input id="payDate" type="date" class="input" required />
                </label>
                <label>
                  <div class="muted" style="font-weight:800;margin-bottom:6px">Method</div>
                  <select id="method" class="input" required>
                    <option value="Revolut">Revolut</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Cash">Cash</option>
                  </select>
                </label>
                <div class="row">
                  <button type="submit" class="btn primary">Save payment</button>
                  <button type="button" class="btn" id="resetBtn">Reset</button>
                </div>
              </div>
            </form>
          </div>
        </section>

        <!-- Payments ledger -->
        <section class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Payments ledger</div>
              <div class="card-subtitle">Most recent first</div>
            </div>
            <button class="btn small" id="refreshBtn" type="button">Refresh</button>
          </div>
          <div class="card-body">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Client</th>
                    <th>Date</th>
                    <th>Method</th>
                    <th>Amount</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="paymentsTbody"></tbody>
              </table>
            </div>
            <div class="footer-note" id="paymentsEmpty" style="display:none">No payments recorded yet.</div>
          </div>
        </section>

      </div>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/js/ui.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/payments.js"></script>
  </body>
</html>
